<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post-Lab 1 | Student Information</title>
    <meta name="description" content="A simple form to collect student information.">
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="deco-rect"></div>
            <div class="deco-rect right"></div>
            <div class="card-header">
                <h2>Student Information</h2>
                <p>Please enter your details below</p>
            </div>
            <!-- The form action is /submit and method is POST -->
            <!-- This allows the server to receive the data using express.urlencoded() middleware -->
            <form action="/submit" method="POST" class="student-form">
                <div class="input-group">
                    <label for="studentName">Student Name</label>
                    <input type="text" id="studentName" name="studentName" placeholder="e.g. Rahul" required>
                </div>
                
                <div class="input-group">
                    <label for="branch">Branch</label>
                    <select id="branch" name="branch" required>
                        <option value="" disabled selected>Select your branch</option>
                        <option value="Computer Engineering">Computer Engineering</option>
                        <option value="Information Technology">Information Technology</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Mechanical Engineering">Mechanical Engineering</option>
                        <option value="Civil Engineering">Civil Engineering</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="year">Year</label>
                    <select id="year" name="year" required>
                        <option value="" disabled selected>Select your year</option>
                        <option value="First Year">First Year</option>
                        <option value="Second Year">Second Year</option>
                        <option value="Third Year">Third Year</option>
                        <option value="Fourth Year">Fourth Year</option>
                    </select>
                </div>
                
                <button type="submit" class="btn-submit">Submit Details</button>
            </form>
        </div>
    </div>
</body>
</html>
